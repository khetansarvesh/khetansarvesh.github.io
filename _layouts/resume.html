---
layout: page-noscript
refactor: true
---

<style>
  #resume-container {
    position: fixed;
    top: 0;
    left: 260px;
    right: 0;
    bottom: 0;
    overflow: hidden;
    background: var(--main-bg, #f8f9fa);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  #resume-container embed {
    width: 100%;
    height: 100%;
    max-width: 900px;
    border: none;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }

  /* Dark mode support */
  [data-bs-theme="dark"] #resume-container {
    background: #1e1e1e;
  }

  /* Mobile: sidebar collapses */
  @media (max-width: 849px) {
    #resume-container {
      left: 0;
    }
  }
</style>

<div id="resume-container">
  {{ content }}
</div>
