<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  
  <!-- Favicon -->
  <link rel="icon" href="{{ '/assets/img/favicons/favicon.ico' | relative_url }}">
  
  <!-- Theme CSS only, no JavaScript -->
  {% if jekyll.environment == 'production' %}
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/jekyll-theme-chirpy.min.css">
  {% else %}
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/jekyll-theme-chirpy.css">
  {% endif %}
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer">
  
  <style>
    /* Additional styles to ensure proper layout without theme JS */
    body { margin: 0; padding: 0; overflow-x: hidden; }
    #sidebar { position: fixed; left: 0; top: 0; height: 100vh; z-index: 1000; }
    #main-wrapper { margin-left: 260px; }
    @media (max-width: 849px) {
      #sidebar { transform: translateX(-100%); }
      #main-wrapper { margin-left: 0; }
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  {% include sidebar.html %}
  
  <!-- Main content -->
  <div id="main-wrapper" class="d-flex flex-column">
    <div id="main">
      {{ content }}
    </div>
  </div>
  
  <!-- NO theme JavaScript loaded -->
</body>
</html>
