<!doctype html>

{% include lang.html %}

<html lang="{{ site.lang | default: 'en' }}" {%- if site.theme_mode == 'light' or site.theme_mode == 'dark' -%}data-bs-theme="{{ site.theme_mode }}"{%- endif -%}>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, user-scalable=no initial-scale=1, shrink-to-fit=no, viewport-fit=cover">

  <title>{{ page.title | default: site.title }}</title>

  <link rel="icon" href="{{ '/assets/img/favicons/favicon.ico' | relative_url }}">

  <!-- Bootstrap (needed for sidebar layout classes; bundled into theme CSS in production) -->
  {% unless jekyll.environment == 'production' %}
    <link rel="stylesheet" href="{{ site.data.origin.cors.bootstrap.css }}">
  {% endunless %}

  <!-- Theme style -->
  <link rel="stylesheet" href="{{ '/assets/css/:THEME.css' | replace: ':THEME', site.theme | relative_url }}">

  <!-- Font Awesome Icons (used by sidebar) -->
  {% include origin-type.html %}
  <link rel="stylesheet" href="{{ site.data.origin[type].fontawesome.css | relative_url }}">

  <!-- Theme JS: handles light/dark mode, runs synchronously so it never conflicts with our page scripts -->
  <script src="{{ '/assets/js/dist/theme.min.js' | relative_url }}"></script>
</head>
<body>
  {% include sidebar.html lang=lang %}

  <div id="main-wrapper">
    {{ content }}
  </div>

  <!-- Theme toggle functionality -->
  <script>
    (function() {
      const toggle = document.getElementById('mode-toggle');
      if (!toggle) return;
      
      toggle.addEventListener('click', function() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute('data-bs-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        
        html.setAttribute('data-bs-theme', newTheme);
        localStorage.setItem('theme', newTheme);
      });
      
      // Set initial theme from localStorage or system preference
      const saved = localStorage.getItem('theme');
      if (saved) {
        document.documentElement.setAttribute('data-bs-theme', saved);
      } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-bs-theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-bs-theme', 'light');
      }
    })();
  </script>
</body>
</html>
