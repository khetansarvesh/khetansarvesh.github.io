---
layout: page-noscript
---

<div id="book-container">
  <div class="book-scene">
    <!-- Left arrow button -->
    <button class="nav-arrow nav-arrow-left" id="prev-btn" aria-label="Previous page">
      <i class="fas fa-chevron-left"></i>
    </button>
    
    <div class="book" id="open-book">
      <!-- Left page -->
      <div class="book-page left-page" id="left-page">
        <div class="page-content" id="left-content"></div>
      </div>
      
      <!-- Book spine/binding -->
      <div class="book-spine"></div>
      
      <!-- Right page -->
      <div class="book-page right-page" id="right-page">
        <div class="page-content" id="right-content"></div>
      </div>
      
      <!-- Turning page overlay -->
      <div class="turning-page" id="turning-page"></div>
    </div>
    
    <!-- Right arrow button -->
    <button class="nav-arrow nav-arrow-right" id="next-btn" aria-label="Next page">
      <i class="fas fa-chevron-right"></i>
    </button>
  </div>
</div>

<!-- Book content from markdown -->
<div id="book-content-source" style="display: none;">
  {{ content }}
</div>


<style>
/* Book Container */
#book-container {
  position: fixed;
  top: 50%;
  left: calc(50% + 130px);
  transform: translate(-50%, -50%);
  z-index: 50;
  padding: 20px;
  width: auto;
}

/* Book Scene - 3D perspective container */
.book-scene {
  perspective: 2000px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 25px;
}

/* Navigation Arrow Buttons */
.nav-arrow {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, #8B4513 0%, #A0522D 100%);
  color: white;
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(139, 69, 19, 0.3);
  z-index: 200;
  flex-shrink: 0;
}

.nav-arrow:hover:not(:disabled) {
  transform: scale(1.1);
  box-shadow: 0 6px 20px rgba(139, 69, 19, 0.4);
}

.nav-arrow:active:not(:disabled) {
  transform: scale(0.95);
}

.nav-arrow:disabled {
  opacity: 0.3;
  cursor: not-allowed;
  transform: none;
}

[data-mode="dark"] .nav-arrow {
  background: linear-gradient(135deg, #5d4434 0%, #8B4513 100%);
}

/* Left arrow starts hidden but stays in layout */
.nav-arrow-left {
  visibility: hidden;
  opacity: 0;
}

/* The Open Book */
.book {
  display: flex;
  align-items: stretch;
  transform-style: preserve-3d;
  transform: rotateX(5deg);
  position: relative;
}

/* Book shadow underneath */
.book::before {
  content: '';
  position: absolute;
  bottom: -20px;
  left: 5%;
  right: 5%;
  height: 30px;
  background: radial-gradient(ellipse at center, rgba(0,0,0,0.3) 0%, transparent 70%);
  filter: blur(10px);
  z-index: -1;
}

/* Individual Pages */
.book-page {
  width: 38vw;
  max-width: 550px;
  height: 75vh;
  padding: 40px 45px;
  box-sizing: border-box;
  position: relative;
  overflow-y: auto;
  transition: box-shadow 0.3s ease;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

.book-page::-webkit-scrollbar {
  display: none;
}

/* Left Page */
.left-page {
  border-radius: 8px 0 0 8px;
  transform-origin: right center;
  box-shadow: 
    -5px 5px 15px rgba(0,0,0,0.1),
    inset 5px 0 15px rgba(0,0,0,0.05);
}

/* Right Page */
.right-page {
  border-radius: 0 8px 8px 0;
  transform-origin: left center;
  box-shadow: 
    5px 5px 15px rgba(0,0,0,0.1),
    inset -5px 0 15px rgba(0,0,0,0.05);
}

/* Turning Page */
.turning-page {
  position: absolute;
  top: 0;
  right: 0;
  width: calc(38vw + 11px);
  max-width: 561px;
  height: 100%;
  transform-origin: left center;
  transform-style: preserve-3d;
  pointer-events: none;
  display: none;
  border-radius: 0 8px 8px 0;
}

.turning-page.active {
  display: block;
  animation: turnPage 0.8s ease-in-out forwards;
}

.turning-page-back.active {
  display: block;
  animation: turnPageBack 0.8s ease-in-out forwards;
}

.turning-page::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(to left, #f0ebe3 0%, #faf7f2 100%);
  border-radius: 0 8px 8px 0;
  backface-visibility: hidden;
}

.turning-page::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(to right, #f0ebe3 0%, #faf7f2 100%);
  border-radius: 0 8px 8px 0;
  transform: rotateY(180deg);
  backface-visibility: hidden;
}

[data-mode="dark"] .turning-page::before {
  background: linear-gradient(to left, #252530 0%, #2d2d3a 100%);
}

[data-mode="dark"] .turning-page::after {
  background: linear-gradient(to right, #252530 0%, #2d2d3a 100%);
}

@keyframes turnPage {
  0% {
    transform: rotateY(0deg);
  }
  100% {
    transform: rotateY(-180deg);
  }
}

@keyframes turnPageBack {
  0% {
    transform: rotateY(-180deg);
  }
  100% {
    transform: rotateY(0deg);
  }
}

/* Book Spine - the binding in the middle */
.book-spine {
  width: 22px;
  height: 75vh;
  position: relative;
  z-index: 10;
  flex-shrink: 0;
}

/* Light mode page colors */
[data-mode="light"] .book-page,
:root:not([data-mode="dark"]) .book-page {
  background: linear-gradient(to right, #f8f5f0 0%, #fdfbf7 50%, #f8f5f0 100%);
  color: #333;
}

[data-mode="light"] .left-page,
:root:not([data-mode="dark"]) .left-page {
  background: linear-gradient(to right, #f0ebe3 0%, #faf7f2 100%);
}

[data-mode="light"] .right-page,
:root:not([data-mode="dark"]) .right-page {
  background: linear-gradient(to left, #f0ebe3 0%, #faf7f2 100%);
}

[data-mode="light"] .book-spine,
:root:not([data-mode="dark"]) .book-spine {
  background: linear-gradient(to right, 
    #8B4513 0%, 
    #A0522D 20%,
    #8B4513 50%,
    #A0522D 80%,
    #8B4513 100%
  );
  box-shadow: 
    inset 0 0 10px rgba(0,0,0,0.4),
    0 0 5px rgba(0,0,0,0.2);
}

/* Dark mode page colors */
[data-mode="dark"] .book-page {
  background: linear-gradient(to right, #2a2a35 0%, #32323f 50%, #2a2a35 100%);
  color: #e0e0e0;
}

[data-mode="dark"] .left-page {
  background: linear-gradient(to right, #252530 0%, #2d2d3a 100%);
}

[data-mode="dark"] .right-page {
  background: linear-gradient(to left, #252530 0%, #2d2d3a 100%);
}

[data-mode="dark"] .book-spine {
  background: linear-gradient(to right, 
    #4a3728 0%, 
    #5d4434 20%,
    #4a3728 50%,
    #5d4434 80%,
    #4a3728 100%
  );
  box-shadow: 
    inset 0 0 10px rgba(0,0,0,0.6),
    0 0 5px rgba(0,0,0,0.4);
}

/* Page edges effect */
.left-page::before,
.right-page::before {
  content: '';
  position: absolute;
  top: 10px;
  bottom: 10px;
  width: 3px;
}

.left-page::before {
  right: -1px;
}

.right-page::before {
  left: -1px;
}

[data-mode="light"] .left-page::before,
[data-mode="light"] .right-page::before,
:root:not([data-mode="dark"]) .left-page::before,
:root:not([data-mode="dark"]) .right-page::before {
  background: repeating-linear-gradient(
    to bottom,
    #e8e4dc 0px,
    #f5f2eb 1px,
    #e8e4dc 2px
  );
}

[data-mode="dark"] .left-page::before,
[data-mode="dark"] .right-page::before {
  background: repeating-linear-gradient(
    to bottom,
    #3a3a45 0px,
    #454550 1px,
    #3a3a45 2px
  );
}

/* Page Content Styling */
.page-content h2 {
  font-size: 1.5rem;
  margin-bottom: 18px;
  padding-bottom: 12px;
  border-bottom: 2px solid;
  font-family: Georgia, 'Times New Roman', serif;
}

[data-mode="light"] .page-content h2,
:root:not([data-mode="dark"]) .page-content h2 {
  color: #5D4037;
  border-color: #D7CCC8;
}

[data-mode="dark"] .page-content h2 {
  color: #BCAAA4;
  border-color: #5D4037;
}

.page-content p {
  line-height: 1.8;
  margin-bottom: 14px;
  font-size: 1rem;
  text-align: justify;
  font-family: Georgia, 'Times New Roman', serif;
}

.page-content a {
  color: #8B4513;
  text-decoration: none;
  font-weight: 500;
  border-bottom: 1px dotted #8B4513;
  transition: all 0.2s ease;
}

[data-mode="dark"] .page-content a {
  color: #D2691E;
  border-bottom-color: #D2691E;
}

.page-content a:hover {
  color: #D2691E;
  border-bottom-style: solid;
}

.page-content ul, .page-content ol {
  margin: 14px 0;
  padding-left: 22px;
}

.page-content li {
  margin-bottom: 8px;
  line-height: 1.7;
  font-family: Georgia, 'Times New Roman', serif;
}

/* Empty page styling */
.empty-page {
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0.3;
  font-style: italic;
  font-family: Georgia, serif;
  font-size: 1.2rem;
}

/* Responsive */
@media (max-width: 1400px) {
  .book-page {
    width: 35vw;
    max-width: 480px;
  }
  
  .turning-page {
    width: calc(35vw + 11px);
    max-width: 491px;
  }
}

@media (max-width: 1200px) {
  .book-page {
    width: 38vw;
    max-width: 420px;
    padding: 35px 35px;
  }
  
  .turning-page {
    width: calc(38vw + 11px);
    max-width: 431px;
  }
}

@media (max-width: 992px) {
  .book-page {
    width: 40vw;
    max-width: 380px;
    padding: 30px 30px;
    height: 65vh;
  }
  
  .book-spine {
    height: 65vh;
  }
  
  .turning-page {
    width: calc(40vw + 11px);
    max-width: 391px;
  }
  
  .nav-arrow {
    width: 45px;
    height: 45px;
  }
  
  .book-scene {
    gap: 15px;
  }
}

@media (max-width: 768px) {
  #book-container {
    position: relative;
    top: auto;
    left: 50%;
    transform: translateX(-50%);
    padding: 20px 10px;
  }
  
  .book-scene {
    flex-direction: column;
    gap: 20px;
  }
  
  .book {
    flex-direction: column;
    transform: rotateX(0deg);
  }
  
  .book-page {
    width: 85vw;
    max-width: 400px;
    height: 50vh;
    border-radius: 8px;
  }
  
  .left-page {
    margin-bottom: 0;
    border-radius: 8px 8px 0 0;
  }
  
  .right-page {
    border-radius: 0 0 8px 8px;
  }
  
  .book-spine {
    width: 85vw;
    max-width: 400px;
    height: 15px;
    min-height: 15px;
  }
  
  .nav-arrow {
    position: fixed;
    z-index: 200;
  }
  
  .nav-arrow-left {
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
  }
  
  .nav-arrow-right {
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
  }
  
  [data-mode="light"] .book-spine,
  :root:not([data-mode="dark"]) .book-spine {
    background: linear-gradient(to bottom, 
      #8B4513 0%, 
      #A0522D 50%,
      #8B4513 100%
    );
  }
  
  [data-mode="dark"] .book-spine {
    background: linear-gradient(to bottom, 
      #4a3728 0%, 
      #5d4434 50%,
      #4a3728 100%
    );
  }
  
  .left-page::before,
  .right-page::before {
    display: none;
  }
}

@media (max-width: 500px) {
  #book-container {
    padding: 10px 5px;
  }
  
  .book-page {
    width: 90vw;
    padding: 25px 20px;
    height: 45vh;
    max-width: 350px;
  }
  
  .book-spine {
    width: 90vw;
    max-width: 350px;
  }
  
  .page-content h2 {
    font-size: 1.3rem;
  }
  
  .nav-arrow {
    width: 40px;
    height: 40px;
    font-size: 1rem;
  }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const contentSource = document.getElementById('book-content-source');
  const leftContent = document.getElementById('left-content');
  const rightContent = document.getElementById('right-content');
  const turningPage = document.getElementById('turning-page');
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');
  
  // Web Audio API for page turn sound
  let audioContext = null;
  
  function playPageTurnSound() {
    if (!audioContext) {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }
    
    const duration = 0.25;
    const now = audioContext.currentTime;
    
    // Create noise for paper rustling effect
    const bufferSize = audioContext.sampleRate * duration;
    const noiseBuffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
    const output = noiseBuffer.getChannelData(0);
    
    for (let i = 0; i < bufferSize; i++) {
      output[i] = Math.random() * 2 - 1;
    }
    
    const noise = audioContext.createBufferSource();
    noise.buffer = noiseBuffer;
    
    // Filter to make it sound more like paper
    const filter = audioContext.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.setValueAtTime(2000, now);
    filter.Q.value = 0.5;
    
    // Envelope for the swoosh effect
    const gainNode = audioContext.createGain();
    gainNode.gain.setValueAtTime(0, now);
    gainNode.gain.linearRampToValueAtTime(0.3, now + 0.02);
    gainNode.gain.exponentialRampToValueAtTime(0.01, now + duration);
    
    noise.connect(filter);
    filter.connect(gainNode);
    gainNode.connect(audioContext.destination);
    
    noise.start(now);
    noise.stop(now + duration);
  }
  
  let currentSpread = 0;
  let pages = [];
  let isAnimating = false;
  
  function parseContent() {
    const content = contentSource.innerHTML;
    const sections = content.split(/<hr\s*\/?>/i);
    
    sections.forEach((section) => {
      if (section.trim()) {
        pages.push(section);
      }
    });
    
    // Add empty pages if we have an odd number
    while (pages.length % 2 !== 0) {
      pages.push('<div class="empty-page">Page intentionally left blank</div>');
    }
    
    renderSpread();
    updateButtons();
  }
  
  function renderSpread() {
    const leftIndex = currentSpread * 2;
    const rightIndex = currentSpread * 2 + 1;
    
    leftContent.innerHTML = pages[leftIndex] || '<div class="empty-page"></div>';
    rightContent.innerHTML = pages[rightIndex] || '<div class="empty-page"></div>';
  }
  
  function updateButtons() {
    const maxSpread = Math.ceil(pages.length / 2) - 1;
    
    // Use visibility/opacity instead of display to keep button in layout
    prevBtn.style.visibility = currentSpread > 0 ? 'visible' : 'hidden';
    prevBtn.style.opacity = currentSpread > 0 ? '1' : '0';
    nextBtn.disabled = currentSpread >= maxSpread;
    nextBtn.style.opacity = currentSpread >= maxSpread ? '0.3' : '1';
  }
  
  function nextSpread() {
    if (isAnimating) return;
    const maxSpread = Math.ceil(pages.length / 2) - 1;
    if (currentSpread >= maxSpread) return;
    
    isAnimating = true;
    
    // Play page turn sound
    playPageTurnSound();
    
    // Show and animate the turning page
    turningPage.classList.remove('turning-page-back');
    turningPage.classList.add('active');
    
    setTimeout(() => {
      currentSpread++;
      renderSpread();
      turningPage.classList.remove('active');
      updateButtons();
      isAnimating = false;
    }, 800);
  }
  
  function prevSpread() {
    if (isAnimating) return;
    if (currentSpread <= 0) return;
    
    isAnimating = true;
    
    // Play page turn sound
    playPageTurnSound();
    
    currentSpread--;
    renderSpread();
    
    // Show and animate the turning page (reverse)
    turningPage.classList.add('turning-page-back', 'active');
    
    setTimeout(() => {
      turningPage.classList.remove('active', 'turning-page-back');
      updateButtons();
      isAnimating = false;
    }, 800);
  }
  
  // Event listeners
  nextBtn.addEventListener('click', nextSpread);
  prevBtn.addEventListener('click', prevSpread);
  
  // Keyboard navigation
  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight' || e.key === ' ') {
      e.preventDefault();
      nextSpread();
    } else if (e.key === 'ArrowLeft') {
      prevSpread();
    }
  });
  
  // Initialize
  parseContent();
});
</script>
